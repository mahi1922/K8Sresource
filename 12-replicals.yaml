apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: nginx-re
  labels:
    project: roboshop
    tier: frontend
spec:
  replicas: 3
  selector:
   matchLabels:
     project: roboshop
     tier: frontend
     app.kubernetes.io/component: frontend
  #POD Defination  
  template:
    metadata:
     name: nginx
     labels:
      project: roboshop
      tier: frontend
      app.kubernetes.io/component: frontend
     spec:
      containers:
       name: nginx-container
       image: nginx
  #ports:
  #    - protocol: TCP
   #     port: 8089
   #     targetPort: 80
   #     nodePort: 30008
       
