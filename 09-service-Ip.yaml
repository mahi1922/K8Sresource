apiVersion: v1
kind: Service
metadata:
  name: podip
  labels:               #service labels
    name: nginx
    purpose: demo
 # Service uses the below labels to select the pods
spec:
  selector:
    matchLabels:
      project: roboshop
      tier: frontend
      app.kubernetes.io/component: frontend
  ports:
    - protocol: TCP
      port: 80 #serviceport
      targetPort: 80 #container port