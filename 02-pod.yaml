apiVersion: v1
kind: Pod
metadata:
  name: nginx
  namespace: roboshop
  labels: 
    project: roboshop
    environment: dev
    purpose: poc
spec:
  containers:
    - name: nginx
      image: nginx
    - name: almalinux
      image: almalinux
      command: ["sleep", "1000"]
---
---
apiVersion: v1
kind: Pod
metadata:
  name: clusterpod
  labels:
    project: roboshop
    tier: frontend
    app.kubernetes.io/component: frontend
spec:
  containers:
    - name: nginx
      image: nginx
      ports:
       - containerPort: 80

      #command: ["sleep", "1000s"]

  
