apiVersion: v1
kind: Service
metadata:
  name: nginx-lb
  labels:
    project: roboshop
    environment: dev
  spec:
    type: LoadBalancer
    selector:
       #matchLabels:
       project: roboshop
       tier: frontend
       component: frontend 
    ports:
      - protocol: TCP
        port: 80
        targetPort: 80
        nodePort: 30008
        