apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deploy
  labels:
    project: roboshop
    tier: frontend
    component: frontend
    purpose: deployment
  spec:
    replicas: 5
    selector:
     matchLabels:
       project: roboshop
       tier: frontend
       app.kubernetes.io/component: frontend
  template:
    name: nginx-dp
    labels:
      project: roboshop
      tier: frontend
      app.kubernetes.io/component: frontend
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80