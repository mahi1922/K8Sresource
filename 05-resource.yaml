apiVersion: v1
kind: Pod
metadata:
  name: podresource
  namespace: roboshop
  labels:
    project: roboshop
    environment: dev
  annotations:
    imageregistry: "https://hub.docker.com/"
    jenkins-build-url: "https://jenkins.joindevops.com/build/roboshop/job/2"
spec:
  containers:
    - name: almalinux
      image: almalinux
      resources:
        requests:
          cpu: "100m" 
          memory: "128Mi"
        limits:
          cpu: "150m"
          memory: "256Mi"
      command: ["sleep", "1000s"]